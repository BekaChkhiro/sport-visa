name: Feature request
description: Suggest a new feature or enhancement.
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or pain point is this solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build? Be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one wins.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Out-of-scope items, follow-ups, or open questions.
    validations:
      required: false
