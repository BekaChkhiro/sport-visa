name: Bug report
description: Something doesn't work the way it should.
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Be specific.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS / device. Production, preview, or local?
      placeholder: 'Chrome 140 / macOS 15 / production'
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Logs, screenshots, Sentry link
      description: Anything else that helps diagnose this.
    validations:
      required: false
