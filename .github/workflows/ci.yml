name: CI

on:
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  # Unit tests import src/lib/db.ts, which constructs a PrismaClient; Prisma
  # requires DATABASE_URL (prisma/schema.prisma: url = env("DATABASE_URL")) to
  # be defined at construction time. The tests mock the actual queries, so a
  # dummy connection string is enough — CI never connects to a real database.
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sportvisa_test'
  # src/lib/env.ts validates NEXT_PUBLIC_APP_URL as a required string at import
  # time; tests that indirectly import logger.ts → env.ts fail without it.
  NEXT_PUBLIC_APP_URL: 'http://localhost:3000'

jobs:
  lint_type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Prettier check
        run: npm run format:check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (metadata only)
        run: npm ci --ignore-scripts

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
