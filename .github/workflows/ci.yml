name: CI

on:
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  # Unit tests import src/lib/db.ts, which constructs a PrismaClient; Prisma
  # requires DATABASE_URL (prisma/schema.prisma: url = env("DATABASE_URL")) to
  # be defined at construction time. The tests mock the actual queries, so a
  # dummy connection string is enough — CI never connects to a real database.
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sportvisa_test'
  # src/lib/env.ts validates NEXT_PUBLIC_APP_URL as a required string at import
  # time; tests that indirectly import logger.ts → env.ts fail without it.
  NEXT_PUBLIC_APP_URL: 'http://localhost:3000'

jobs:
  lint_type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Prettier check
        run: npm run format:check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint_type, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sport_visa_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sport_visa_e2e'
      E2E_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sport_visa_e2e'
      NEXT_PUBLIC_APP_URL: 'http://127.0.0.1:3000'
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-e2e-test-secret-32-chars-long!!!' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run E2E smoke test
        run: npm run e2e -- e2e/specs/smoke.spec.ts

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: playwright-report/
          retention-days: 7

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (metadata only)
        run: npm ci --ignore-scripts

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
